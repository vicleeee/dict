<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>教师后台 - 凡人修仙传</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }



        body {

            font-family: 'Microsoft YaHei', sans-serif;

            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

            min-height: 100vh;

            color: #fff;

        }



        .container {

            max-width: 1400px;

            margin: 0 auto;

            padding: 20px;

        }



        .header {

            text-align: center;

            padding: 30px 0;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            border-radius: 20px;

            margin-bottom: 30px;

            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);

        }



        .header h1 {

            font-size: 2.5em;

            margin-bottom: 10px;

        }



        .header p {

            font-size: 1.2em;

            opacity: 0.9;

        }



        .controls {

            display: flex;

            gap: 15px;

            margin-bottom: 30px;

            flex-wrap: wrap;

        }



        .btn {

            background: linear-gradient(45deg, #667eea, #764ba2);

            color: white;

            border: none;

            padding: 12px 24px;

            border-radius: 25px;

            font-size: 16px;

            cursor: pointer;

            transition: all 0.3s;

            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);

        }



        .btn:hover {

            transform: translateY(-2px);

            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);

        }



        .btn.secondary {

            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);

        }



        .btn.danger {

            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);

        }



        .stats-grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

            gap: 20px;

            margin-bottom: 30px;

        }



        .stat-card {

            background: rgba(255, 255, 255, 0.1);

            border-radius: 15px;

            padding: 20px;

            text-align: center;

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.1);

        }



        .stat-card .value {

            font-size: 2.5em;

            font-weight: bold;

            background: linear-gradient(45deg, #667eea, #764ba2);

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }



        .stat-card .label {

            font-size: 1em;

            opacity: 0.8;

            margin-top: 5px;

        }



        .section {

            background: rgba(255, 255, 255, 0.05);

            border-radius: 20px;

            padding: 25px;

            margin-bottom: 30px;

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.1);

        }



        .section h2 {

            font-size: 1.8em;

            margin-bottom: 20px;

            display: flex;

            align-items: center;

            gap: 10px;

        }



        .leaderboard {

            display: flex;

            flex-direction: column;

            gap: 15px;

        }



        .leaderboard-item {

            display: flex;

            align-items: center;

            background: rgba(255, 255, 255, 0.1);

            border-radius: 15px;

            padding: 15px 20px;

            transition: all 0.3s;

        }



        .leaderboard-item:hover {

            transform: translateX(10px);

            background: rgba(255, 255, 255, 0.15);

        }



        .leaderboard-item.top-1 {

            background: linear-gradient(45deg, #ffd700, #ffed4a);

            color: #1a1a2e;

        }



        .leaderboard-item.top-2 {

            background: linear-gradient(45deg, #c0c0c0, #e8e8e8);

            color: #1a1a2e;

        }



        .leaderboard-item.top-3 {

            background: linear-gradient(45deg, #cd7f32, #daa06d);

            color: #1a1a2e;

        }



        .rank {

            font-size: 1.5em;

            font-weight: bold;

            width: 50px;

            text-align: center;

        }



        .student-info {

            flex: 1;

            padding: 0 15px;

        }



        .student-name {

            font-size: 1.2em;

            font-weight: bold;

        }



        .student-details {

            font-size: 0.9em;

            opacity: 0.8;

            margin-top: 5px;

        }



        .student-stats {

            display: flex;

            gap: 20px;

            text-align: right;

        }



        .stat {

            display: flex;

            flex-direction: column;

            align-items: center;

        }



        .stat-value {

            font-size: 1.3em;

            font-weight: bold;

        }



        .stat-label {

            font-size: 0.8em;

            opacity: 0.7;

        }



        .data-table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 15px;

        }



        .data-table th,

        .data-table td {

            padding: 12px;

            text-align: left;

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

        }



        .data-table th {

            background: rgba(102, 126, 234, 0.3);

            font-weight: bold;

        }



        .data-table tr:hover {

            background: rgba(255, 255, 255, 0.05);

        }



        .data-table .score {

            font-weight: bold;

            color: #4facfe;

        }



        .data-table .time {

            color: #a0aec0;

        }



        .loading {

            text-align: center;

            padding: 40px;

            font-size: 1.2em;

        }



        .error {

            text-align: center;

            padding: 20px;

            color: #f5576c;

            background: rgba(245, 87, 108, 0.1);

            border-radius: 10px;

        }



        .empty {

            text-align: center;

            padding: 40px;

            color: #a0aec0;

        }



        .filter-bar {

            display: flex;

            gap: 15px;

            margin-bottom: 20px;

            flex-wrap: wrap;

        }



        .search-input {

            flex: 1;

            min-width: 200px;

            padding: 12px 20px;

            border: 2px solid rgba(255, 255, 255, 0.2);

            border-radius: 25px;

            background: rgba(255, 255, 255, 0.1);

            color: #fff;

            font-size: 16px;

        }



        .search-input::placeholder {

            color: rgba(255, 255, 255, 0.5);

        }



        .search-input:focus {

            outline: none;

            border-color: #667eea;

        }



        @media (max-width: 768px) {

            .header h1 {

                font-size: 1.8em;

            }

            

            .student-stats {

                flex-direction: column;

                gap: 5px;

            }

            

            .data-table {

                font-size: 0.9em;

            }

            

            .data-table th,

            .data-table td {

                padding: 8px;

            }

        }



        /* 详情模态框 */

        .modal {

            display: none;

            position: fixed;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.7);

            z-index: 1000;

            justify-content: center;

            align-items: center;

            padding: 20px;

        }



        .modal.active {

            display: flex;

        }



        .modal-content {

            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

            border-radius: 20px;

            padding: 30px;

            max-width: 700px;

            width: 100%;

            max-height: 80vh;

            overflow-y: auto;

            border: 1px solid rgba(255, 255, 255, 0.1);

        }



        .modal-header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

        }



        .modal-close {

            background: none;

            border: none;

            color: #fff;

            font-size: 24px;

            cursor: pointer;

            padding: 5px;

        }



        .modal-close:hover {

            color: #667eea;

        }

    </style>

</head>

<body>

    <div class="container">

        <header class="header">

            <h1>🎓 教师后台</h1>

            <p>凡人修仙传 - 学生学习数据查询</p>

        </header>



        <div class="controls">

            <button class="btn" onclick="loadData()">🔄 刷新数据</button>

            <button class="btn secondary" onclick="exportData()">📥 导出数据</button>

            <a href="index.html" class="btn">🏠 返回游戏</a>

        </div>

        <div style="text-align:center; margin:10px 0 20px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">

            <input type="text" id="apiUrlInput" placeholder="QuickForm API地址（默认已配置）" style="padding:8px 12px; border:1px solid #ccc; border-radius:6px; width:320px; font-size:14px;">

            <button onclick="saveApiUrl()" style="padding:8px 16px; background:#667eea; color:white; border:none; border-radius:6px; cursor:pointer; font-size:14px;">保存地址</button>

        </div>



        <div class="stats-grid" id="statsGrid">

            <div class="stat-card">

                <div class="value" id="totalStudents">0</div>

                <div class="label">总学习人次</div>

            </div>

            <div class="stat-card">

                <div class="value" id="totalWords">0</div>

                <div class="label">总单词数</div>

            </div>

            <div class="stat-card">

                <div class="value" id="avgScore">0</div>

                <div class="label">平均得分</div>

            </div>

            <div class="stat-card">

                <div class="value" id="avgCorrect">0%</div>

                <div class="label">平均正确率</div>

            </div>

        </div>



        <div class="section">

            <h2>🏆 排行榜 TOP 10</h2>

            <div id="leaderboard" class="leaderboard">

                <div class="loading">正在加载排行榜数据...</div>

            </div>

        </div>



        <div class="section">

            <h2>📋 全部学习记录</h2>

            <div class="filter-bar">

                <input type="text" class="search-input" id="searchInput" placeholder="搜索学生姓名..." oninput="filterData()">

            </div>

            <div id="dataTable">

                <div class="loading">正在加载数据...</div>

            </div>

        </div>

    </div>



    <script>

        let allData = [];
        
        // API地址配置（可从 localStorage 读取自定义地址）
        function getApiBase() {
            const saved = localStorage.getItem('quickformApiUrl');
            return saved || 'https://quickform.cn/api/yyvd0ppbvq';
        }
        
        // 保存 API URL
        function saveApiUrl() {
            const url = document.getElementById('apiUrlInput').value.trim();
            if (url) {
                localStorage.setItem('quickformApiUrl', url);
                alert('API地址已保存，正在重新加载...');
                loadData();
            } else {
                localStorage.removeItem('quickformApiUrl');
                alert('已恢复默认地址，正在重新加载...');
                loadData();
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('quickformApiUrl');
            if (saved) {
                const inp = document.getElementById('apiUrlInput');
                if (inp) inp.value = saved;
            }
        });
        
        const API_BASE = getApiBase();

        

        // 加载数据

        async function loadData() {

            const leaderboardEl = document.getElementById('leaderboard');

            const dataTableEl = document.getElementById('dataTable');

            

            leaderboardEl.innerHTML = '<div class="loading">正在加载排行榜数据...</div>';

            dataTableEl.innerHTML = '<div class="loading">正在加载数据...</div>';

            

            // 直接使用API

            const apiUrl = `${getApiBase()}/all`;

            

            try {

                console.log('正在请求API:', apiUrl);

                const response = await fetch(apiUrl);

                

                console.log('响应状态:', response.status);

                

                if (!response.ok) {

                    throw new Error('获取数据失败: ' + response.status);

                }

                

                const data = await response.json();

                console.log('获取到的数据:', data);

                console.log('数据类型:', typeof data);

                

                // 如果返回的是对象而不是数组，尝试找到数组

                if (!Array.isArray(data)) {

                    // 可能是 {status: "success", data: [...]} 格式

                    if (data.data && Array.isArray(data.data)) {

                        allData = data.data;

                    } else if (data.records && Array.isArray(data.records)) {

                        allData = data.records;

                    } else {

                        // 尝试取第一个数组属性

                        const arrayProp = Object.values(data).find(v => Array.isArray(v));

                        allData = arrayProp || [];

                    }

                } else {

                    allData = data;

                }

                

                if (allData.length === 0) {

                    leaderboardEl.innerHTML = '<div class="empty">暂无学习记录<br><br>请确认：<br>1. 学生已完成背单词游戏<br>2. 游戏结束后数据已提交</div>';

                    dataTableEl.innerHTML = '<div class="empty">暂无学习记录</div>';

                    

                    // 显示API返回的原始数据帮助调试

                    console.log('API返回的原始数据:', data);

                    return;

                }

                

                // 按提交时间倒序排列

                allData.sort((a, b) => {

                    const timeA = new Date(a.submitTime || 0);

                    const timeB = new Date(b.submitTime || 0);

                    return timeB - timeA;

                });

                

                updateStats();

                renderLeaderboard();

                renderDataTable();

                

            } catch (error) {

                console.error('加载数据出错:', error);

                let errorMsg = `加载数据失败: ${error.message}`;

                

                // 检测跨域错误

                if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {

                    errorMsg = `

                        <p style="margin-bottom:15px;">⚠️ 无法连接到数据服务器</p>

                        <p style="font-size:0.9em;">可能是跨域(CORS)问题。请尝试：</p>

                        <ul style="text-align:left;margin:10px 0;font-size:0.85em;list-style:inside;">

                            <li>刷新页面重试</li>

                            <li>检查网络连接</li>

                            <li>确认API服务器正常运行</li>

                        </ul>

                        <p style="font-size:0.8em;color:#ffd700;margin-top:10px;">${error.message}</p>

                    `;

                }

                

                leaderboardEl.innerHTML = `<div class="error">${errorMsg}</div>`;

                dataTableEl.innerHTML = `<div class="error">${errorMsg}</div>`;

            }

        }



        // 更新统计信息

        function updateStats() {

            document.getElementById('totalStudents').textContent = allData.length;

            

            const totalWords = allData.reduce((sum, item) => sum + (item.totalWords || 0), 0);

            document.getElementById('totalWords').textContent = totalWords;

            

            const avgScore = allData.length > 0 

                ? Math.round(allData.reduce((sum, item) => sum + (item.score || 0), 0) / allData.length)

                : 0;

            document.getElementById('avgScore').textContent = avgScore;

            

            const avgCorrect = allData.length > 0

                ? Math.round(allData.reduce((sum, item) => sum + ((item.correctCount || 0) / (item.totalWords || 1)) * 100, 0) / allData.length)

                : 0;

            document.getElementById('avgCorrect').textContent = avgCorrect + '%';

        }



        // 渲染排行榜

        function renderLeaderboard() {

            const leaderboardEl = document.getElementById('leaderboard');

            

            if (allData.length === 0) {

                leaderboardEl.innerHTML = '<div class="empty">暂无排行榜数据</div>';

                return;

            }

            

            // 按得分排序，取前10名

            const topStudents = [...allData]

                .sort((a, b) => (b.score || 0) - (a.score || 0))

                .slice(0, 10);

            

            const rankIcons = ['🥇', '🥈', '🥉', '4', '5', '6', '7', '8', '9', '10'];

            

            leaderboardEl.innerHTML = topStudents.map((item, index) => {

                const rankClass = index < 3 ? `top-${index + 1}` : '';

                const correctRate = item.totalWords > 0 

                    ? Math.round((item.correctCount / item.totalWords) * 100) 

                    : 0;

                

                return `

                    <div class="leaderboard-item ${rankClass}">

                        <div class="rank">${rankIcons[index]}</div>

                        <div class="student-info">

                            <div class="student-name">${item.studentName || '未知学生'}</div>

                            <div class="student-details">${item.dictionaryName || ''} | ${item.submitTime ? new Date(item.submitTime).toLocaleDateString() : ''}</div>

                        </div>

                        <div class="student-stats">

                            <div class="stat">

                                <div class="stat-value">${item.score || 0}</div>

                                <div class="stat-label">得分</div>

                            </div>

                            <div class="stat">

                                <div class="stat-value">${correctRate}%</div>

                                <div class="stat-label">正确率</div>

                            </div>

                            <div class="stat">

                                <div class="stat-value">${item.timeSpent || '-'}</div>

                                <div class="stat-label">用时</div>

                            </div>

                        </div>

                    </div>

                `;

            }).join('');

        }



        // 渲染数据表格

        function renderDataTable(filteredData = null) {

            const dataTableEl = document.getElementById('dataTable');

            const data = filteredData || allData;

            

            if (data.length === 0) {

                dataTableEl.innerHTML = '<div class="empty">暂无数据</div>';

                return;

            }

            

            dataTableEl.innerHTML = `

                <table class="data-table">

                    <thead>

                        <tr>

                            <th>序号</th>

                            <th>学生姓名</th>

                            <th>学习内容</th>

                            <th>正确/错误</th>

                            <th>得分</th>

                            <th>用时</th>

                            <th>正确率</th>

                            <th>提交时间</th>

                            <th>操作</th>

                        </tr>

                    </thead>

                    <tbody>

                        ${data.map((item, index) => {

                            const correctRate = item.totalWords > 0 

                                ? Math.round((item.correctCount / item.totalWords) * 100) 

                                : 0;

                            const submitTime = item.submitTime 

                                ? new Date(item.submitTime).toLocaleString() 

                                : '-';

                            

                            return `

                                <tr onclick="showDetail(${index})" style="cursor:pointer;">

                                    <td>${index + 1}</td>

                                    <td><strong>${item.studentName || '未知学生'}</strong></td>

                                    <td>${item.dictionaryName || '-'}</td>

                                    <td>${item.correctCount || 0} / ${item.wrongCount || 0}</td>

                                    <td class="score">${item.score || 0}</td>

                                    <td class="time">${item.timeSpent || '-'}</td>

                                    <td>${correctRate}%</td>

                                    <td>${submitTime}</td>

                                    <td><button style="padding:5px 10px;font-size:12px;">查看详情</button></td>

                                </tr>

                            `;

                        }).join('')}

                    </tbody>

                </table>

            `;

        }



        // 显示详情模态框

        function showDetail(index) {

            const item = allData[index];

            const modal = document.getElementById('detailModal');

            const content = document.getElementById('detailContent');

            

            const correctWords = item.correctWords ? item.correctWords.split(', ') : [];

            const wrongWords = item.wrongWords ? item.wrongWords.split(', ') : [];

            

            content.innerHTML = `

                <div style="text-align:center;margin-bottom:20px;">

                    <h2 style="color:#667eea;">${item.studentName || '未知学生'}</h2>

                    <p style="color:#a0aec0;">${item.dictionaryName || ''} | ${item.submitTime ? new Date(item.submitTime).toLocaleString() : ''}</p>

                </div>

                

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

                    <div style="background:rgba(16, 185, 129, 0.1);border:1px solid #10b981;border-radius:15px;padding:20px;">

                        <h3 style="color:#10b981;margin-bottom:15px;">✅ 正确单词 (${correctWords.length})</h3>

                        <div style="display:flex;flex-wrap:wrap;gap:8px;">

                            ${correctWords.length > 0 

                                ? correctWords.map(w => `<span style="background:#10b981;color:white;padding:5px 12px;border-radius:15px;font-size:0.9em;">${w.trim()}</span>`).join('')

                                : '<span style="color:#a0aec0;">无</span>'

                            }

                        </div>

                    </div>

                    

                    <div style="background:rgba(239, 68, 68, 0.1);border:1px solid #ef4444;border-radius:15px;padding:20px;">

                        <h3 style="color:#ef4444;margin-bottom:15px;">❌ 错误单词 (${wrongWords.length})</h3>

                        <div style="display:flex;flex-wrap:wrap;gap:8px;">

                            ${wrongWords.length > 0 

                                ? wrongWords.map(w => `<span style="background:#ef4444;color:white;padding:5px 12px;border-radius:15px;font-size:0.9em;">${w.trim()}</span>`).join('')

                                : '<span style="color:#a0aec0;">无</span>'

                            }

                        </div>

                    </div>

                </div>

                

                <div style="margin-top:20px;padding:20px;background:rgba(255,255,255,0.05);border-radius:15px;">

                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:15px;text-align:center;">

                        <div>

                            <div style="font-size:1.5em;font-weight:bold;color:#667eea;">${item.score || 0}</div>

                            <div style="font-size:0.8em;color:#a0aec0;">得分</div>

                        </div>

                        <div>

                            <div style="font-size:1.5em;font-weight:bold;color:#10b981;">${item.correctCount || 0}</div>

                            <div style="font-size:0.8em;color:#a0aec0;">正确</div>

                        </div>

                        <div>

                            <div style="font-size:1.5em;font-weight:bold;color:#ef4444;">${item.wrongCount || 0}</div>

                            <div style="font-size:0.8em;color:#a0aec0;">错误</div>

                        </div>

                        <div>

                            <div style="font-size:1.5em;font-weight:bold;color:#f59e0b;">${item.timeSpent || '-'}</div>

                            <div style="font-size:0.8em;color:#a0aec0;">用时</div>

                        </div>

                    </div>

                </div>

            `;

            

            modal.classList.add('active');

        }



        // 关闭详情模态框

        function closeDetailModal() {

            document.getElementById('detailModal').classList.remove('active');

        }



        // 筛选数据

        function filterData() {

            const searchText = document.getElementById('searchInput').value.trim().toLowerCase();

            

            if (!searchText) {

                renderDataTable();

                return;

            }

            

            const filtered = allData.filter(item => {

                const name = (item.studentName || '').toLowerCase();

                return name.includes(searchText);

            });

            

            renderDataTable(filtered);

        }



        // 导出数据

        function exportData() {

            if (allData.length === 0) {

                alert('暂无数据可导出');

                return;

            }

            

            const csvContent = [

                ['序号', '学生姓名', '学习内容', '正确数', '错误数', '总分', '用时', '正确率', '提交时间'],

                ...allData.map((item, index) => [

                    index + 1,

                    item.studentName || '',

                    item.dictionaryName || '',

                    item.correctCount || 0,

                    item.wrongCount || 0,

                    item.score || 0,

                    item.timeSpent || '',

                    item.totalWords > 0 ? Math.round((item.correctCount / item.totalWords) * 100) + '%' : '0%',

                    item.submitTime ? new Date(item.submitTime).toLocaleString() : ''

                ])

            ].map(row => row.join(',')).join('\n');

            

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });

            const link = document.createElement('a');

            link.href = URL.createObjectURL(blob);

            link.download = `学生学习数据_${new Date().toLocaleDateString()}.csv`;

            link.click();

        }



        // 页面加载时自动获取数据

        window.addEventListener('DOMContentLoaded', loadData);



        // 点击模态框外部关闭

        document.getElementById('detailModal').addEventListener('click', function(e) {

            if (e.target === this) {

                closeDetailModal();

            }

        });

    </script>



    <!-- 详情模态框 -->

    <div class="modal" id="detailModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2 style="margin:0;">📝 学习详情</h2>

                <button class="modal-close" onclick="closeDetailModal()">&times;</button>

            </div>

            <div id="detailContent">

                <!-- 详情内容 -->

            </div>

        </div>

    </div>

</body>

</html>
